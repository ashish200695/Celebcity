name: Build and publish CelebCity

on:
  schedule:
    # Runs every 3 hours. GitHub may delay this slightly under load — that's normal for free scheduled runs.
    - cron: "0 */3 * * *"
  workflow_dispatch: {} # lets you trigger a manual run from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch news and build site
        run: npm run build

      - name: Commit updated post index
        run: |
          git config user.name "celebcity-bot"
          git config user.email "actions@github.com"
          git add data/posts.json
          git diff --cached --quiet || git commit -m "Auto-update posts $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
