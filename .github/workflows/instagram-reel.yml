name: Post Reel to Instagram (every 3 hours)

on:
  schedule:
    # Every 3 hours, 10am-10pm IST (04:30,07:30,10:30,13:30,16:30 UTC). Silent 10pm-10am IST.
    - cron: "30 4,7,10,13,16 * * *"
  workflow_dispatch: {} # lets you trigger a manual post from the Actions tab

permissions:
  contents: write

concurrency:
  group: "celebcity-git-write"
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Post Reel to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          POST_MODE: reel
        run: node scripts/post-instagram.js

      - name: Commit posted-status update
        run: |
          git config user.name "celebcity-bot"
          git config user.email "actions@github.com"
          git add data/posts.json
          git diff --cached --quiet || git commit -m "Mark Instagram Reel post status $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git pull --rebase -X ours origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
